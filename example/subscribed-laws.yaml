# subscribed-laws.yaml — Client Deliverable Gate
#
# Maps law IDs to the stage that evaluates them.
# Laws live in laws/ as standalone files.

subscriptions:

  # --- Stage: mechanical-checks ---
  - law: a1b2c3d4-e5f6-7890-abcd-ef1234567890       # No Placeholder Text
    stage: mechanical-checks
  - law: b2c3d4e5-f6a7-8901-bcde-f12345678901       # Executive Summary Present
    stage: mechanical-checks
  - law: c3d4e5f6-a7b8-9012-cdef-123456789012       # No Banned Jargon
    stage: mechanical-checks

  # --- Stage: argument-quality ---
  - law: d4e5f6a7-b8c9-0123-defa-234567890123       # Recommendation Grounded in Analysis
    stage: argument-quality
  - law: e5f6a7b8-c9d0-1234-efab-345678901234       # Actionable Next Steps
    stage: argument-quality
